es:
  date:
    formats:
      default: "%d/%m/%Y"
      short: "%d/%m/%Y"
      long: "%d de %B de %Y"
    day_names:
      - domingo
      - lunes
      - martes
      - miércoles
      - jueves
      - viernes
      - sábado
    abbr_day_names: [dom, lun, mar, mié, jue, vie, sáb]
    month_names:
      -
      - enero
      - febrero
      - marzo
      - abril
      - mayo
      - junio
      - julio
      - agosto
      - septiembre
      - octubre
      - noviembre
      - diciembre
    abbr_month_names: [~, ene, feb, mar, abr, may, jun, jul, ago, sep, oct, nov, dic]
  time:
    formats:
      default: "%d/%m/%Y %H:%M"
      short: "%d/%m %H:%M"
      long: "%d de %B de %Y a las %H:%M"
  number:
    format:
      separator: ","
      delimiter: "."
      precision: 2
    currency:
      format:
        unit: "$"
        format: "%u%n"
        separator: ","
        delimiter: "."
        precision: 0

  banklinker:
    app_name: BankLinker
    tagline: Budget control
    tips:
      - Los extractos de RappiPay vienen cifrados. Guarda tu contraseña a mano.
      - Para OCR de imágenes necesitas tener instalado tesseract-ocr en tu sistema.
      - Usa el preview para descartar movimientos duplicados antes de categorizarlos.
      - El filtro de rango de fechas permite importar solo el mes que te interesa.
      - Las categorías son opcionales por movimiento y se exportan en el CSV.
      - Los sobres son los botones de categorización. Más sobres, más granularidad.
      - Usa "Empezar de cero" si quieres probar con un archivo nuevo sin mezclar datos.
      - El botón del ojito en el campo de contraseña te deja verificar lo que escribiste.
      - Todo se procesa localmente en tu máquina, los archivos no salen de ahí.
      - RappiCard solo tiene gastos; RappiCuenta detecta ingresos y gastos según el signo.

  nav:
